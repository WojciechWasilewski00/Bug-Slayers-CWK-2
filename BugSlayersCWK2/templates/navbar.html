{% load static %}
<div class="sidebar">
  <!-- Sidebar Brand / Logo -->
  <a href="{% url 'scheduling:dashboard' %}" class="sidebar-brand">
    <img src="{% static 'logo/logo.png' %}" alt="Logo" class="brand-logo" />
  </a>

  <!-- Core Navigation Links -->
  <div class="flex-grow-1">
    <a href="{% url 'scheduling:dashboard' %}"
       class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
      <span class="icon-wrapper">🏠</span> Dashboard
    </a>

    <a href="{% url 'team_page' %}"
       class="{% if request.resolver_match.url_name == 'team_page' %}active{% endif %}">
      <span class="icon-wrapper">👥</span> Teams
    </a>

    <a href="{% url 'organisation' %}"
       class="{% if request.resolver_match.url_name == 'organisation' %}active{% endif %}">
      <span class="icon-wrapper">🏢</span> Organisation
    </a>

    <a href="{% url 'scheduling:weekly_schedule' %}"
       class="{% if request.resolver_match.url_name == 'weekly_schedule' %}active{% endif %}">
      <span class="icon-wrapper">📅</span> Schedule
    </a>

    <a href="{% url 'inbox' %}"
       class="{% if request.resolver_match.url_name == 'inbox' %}active{% endif %}">
      <span class="icon-wrapper">📩</span> Messages
    </a>

    <a href="{% url 'reports' %}"
       class="{% if request.resolver_match.url_name == 'reports' %}active{% endif %}">
      <span class="icon-wrapper">📊</span> Reports
    </a>
  </div>

  <!-- Administration Section -->
  <div class="mt-auto border-top pt-2 pb-3">
    <div class="nav-section-title">Administration</div>

    <a href="#">
      <span class="icon-wrapper">⚙️</span> Settings
    </a>

    <a href="/admin/" target="_blank">
      <span class="icon-wrapper">🛡️</span> Admin Panel
    </a>
  </div>
</div>
