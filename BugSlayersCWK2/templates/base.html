{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Bug Slayers{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --sidebar-bg: #ffffff;
      --sidebar-text: #5a6a85;
      --accent-color: #5d87ff;
      --hover-bg: #f6f9fc;
      --body-bg: #f4f7f6;
    }

    body {
      background-color: var(--body-bg);
      min-height: 100vh;
      margin: 0;
      font-family: "Plus Jakarta Sans", sans-serif;
      color: #2a3547;
    }

    .sidebar {
      width: 270px;
      background-color: var(--sidebar-bg);
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      border-right: 1px solid #eef2f6;
      display: flex;
      flex-direction: column;
      z-index: 1000;
    }

    .sidebar-brand {
      padding: 22px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .sidebar-logo {
      max-width: 180px;
      height: auto;
      display: block;
    }

    .sidebar a {
      padding: 10px 20px;
      margin: 2px 15px;
      display: flex;
      align-items: center;
      color: var(--sidebar-text);
      text-decoration: none;
      border-radius: 7px;
      font-weight: 500;
    }

    .sidebar a:hover,
    .sidebar a.active {
      background-color: #ecf2ff;
      color: var(--accent-color);
      font-weight: 600;
    }

    .icon-wrapper {
      width: 30px;
      font-size: 1.1rem;
    }

    .main-content {
      margin-left: 270px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .top-nav-bar {
      background: #fff;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eef2f6;
      position: sticky;
      top: 0;
      z-index: 998;
    }

    .top-nav-links a {
      text-decoration: none;
      color: var(--sidebar-text);
      font-weight: 600;
      margin-right: 25px;
    }

    .content-padding {
      padding: 40px;
    }

    .mt-auto {
      margin-top: auto;
    }
  </style>
</head>

<body>
  <div class="sidebar">
    <div class="sidebar-brand">
      <img src="{% static 'logo/logo.png' %}" alt="Logo" class="sidebar-logo">
    </div>

    <div class="flex-grow-1">
      <a href="{% url 'dashboard' %}">
        <span class="icon-wrapper">🏠</span> Dashboard
      </a>

      <a href="{% url 'team_page' %}">
        <span class="icon-wrapper">👥</span> Teams
      </a>
      <a href="#"><span class="icon-wrapper">📂</span> Documents</a>

      <a href="{% url 'weekly_schedule' %}">
        <span class="icon-wrapper">📅</span> Schedule
      </a>
      <a href="{% url 'inbox' %}">
        <span class="icon-wrapper">📩</span> Messages
      </a>

    </div>

  
      <a href="#">
        <span class="icon-wrapper">⚙️</span> Settings
      </a>
    </div>
  </div>

  <div class="main-content">
    <div class="top-nav-bar">
      <div class="top-nav-links">
        <a href="{% url 'dashboard' %}">Home</a>
        <a href="#">Service</a>
        <a href="#">Portfolio</a>
        <a href="#">Contact</a>
      </div>

      <div class="topbar-right">
        {% if user.is_authenticated %}
          <span>Hello, <strong>{{ user.username }}</strong></span>
          <form action="{% url 'logout' %}" method="post" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="btn btn-sm btn-outline-danger">Logout</button>
          </form>
        {% else %}
          <a href="{% url 'login' %}" class="btn btn-sm btn-primary">Login</a>
        {% endif %}
      </div>
    </div>

    <div class="content-padding">
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
