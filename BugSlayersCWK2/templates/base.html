<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bug Slayers{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sidebar-bg: #ffffff;
            --sidebar-text: #5a6a85;
            --accent-color: #5d87ff; /* The blue from your UI */
            --hover-bg: #f6f9fc;
            --body-bg: #f4f7f6;
        }
        
        body { 
            background-color: var(--body-bg);
            display: flex; 
            min-height: 100vh;
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        
        /* Sidebar container with Flexbox to push admin to bottom */
        .sidebar {
            width: 270px;
            background-color: var(--sidebar-bg);
            position: fixed;
            height: 100vh;
            border-right: 1px solid #eef2f6;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar-brand {
            padding: 30px 25px;
            font-size: 1.3rem;
            font-weight: 800;
            color: #2a3547;
            letter-spacing: -0.5px;
        }

        .nav-section-title {
            font-size: 0.7rem;
            font-weight: 700;
            color: #2a3547;
            text-transform: uppercase;
            padding: 10px 25px;
            margin-top: 15px;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .sidebar a {
            padding: 10px 20px;
            margin: 2px 15px;
            display: flex;
            align-items: center;
            color: var(--sidebar-text);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            border-radius: 7px;
            transition: all 0.2s ease-in-out;
        }

        .sidebar a:hover {
            background-color: var(--hover-bg);
            color: var(--accent-color);
        }

        /* Logic to highlight the active page */
        .sidebar a.active {
            background-color: #ecf2ff;
            color: var(--accent-color);
            font-weight: 600;
        }

        .icon-wrapper {
            width: 30px;
            font-size: 1.1rem;
        }

        /* Content offset for the sidebar */
        .main-content {
            margin-left: 270px;
            flex-grow: 1;
            padding: 40px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-brand">
            <span style="color: var(--accent-color);">BUG</span>SLAYERS
        </div>
        
        <div class="flex-grow-1">
            <div class="nav-section-title">Home</div>
            <a href="#"><span class="icon-wrapper">🏠</span> Dashboard</a>

            <div class="nav-section-title">Schedule</div>
            <a href="{% url 'weekly_schedule' %}" class="{% if request.resolver_match.url_name == 'weekly_schedule' %}active{% endif %}">📅</span> Weekly Schedule
            </a>
            <a href="#" data-bs-toggle="modal" data-bs-target="#addMeetingModal">
                <span class="icon-wrapper">➕</span> Schedule
            </a>

            <div class="nav-section-title">Team Workspace</div>
            <a href="http://127.0.0.1:8000/teams/"><span class="icon-wrapper">👥</span> Teams</a>
            <a href="#"><span class="icon-wrapper">📂</span> Documents</a>
            <a href="#"><span class="icon-wrapper">📩</span> Messages</a>
        </div>

        <div class="mt-auto border-top pt-3 pb-4">
            <div class="nav-section-title">Administration</div>
            <a href="#"><span class="icon-wrapper">⚙️</span> Settings</a>
            <a href="/admin/" target="_blank">
                <span class="icon-wrapper">🛡️</span> Admin Panel
            </a>
        </div>
    </div>

    <div class="main-content">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
