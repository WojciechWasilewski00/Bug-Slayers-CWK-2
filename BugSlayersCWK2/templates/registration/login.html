{% extends "base.html" %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; border: 1px solid #e5eaef;">
        
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="margin: 0; color: #2a3547;">Welcome Back</h2>
            <p style="color: #5a6a85; margin-top: 10px;">Please enter your credentials to login.</p>
        </div>

        <form method="post" style="display: flex; flex-direction: column; gap: 20px;">
            {% csrf_token %}
            
            {% if form.errors %}
                <div style="color: #fa5252; background: #fff5f5; padding: 10px; border-radius: 5px; font-size: 0.9rem; border: 1px solid #ffc9c9;">
                    Your username or password was incorrect.
                </div>
            {% endif %}

            <div class="form-group">
                <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #2a3547;">Username</label>
                <input type="text" name="username" style="width: 100%; padding: 12px; border: 1px solid #e5eaef; border-radius: 7px; box-sizing: border-box;">
            </div>

            <div class="form-group">
                <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #2a3547;">Password</label>
                <input type="password" name="password" style="width: 100%; padding: 12px; border: 1px solid #e5eaef; border-radius: 7px; box-sizing: border-box;">
            </div>

            <button type="submit" style="background: #5d87ff; color: white; border: none; padding: 14px; border-radius: 7px; font-weight: 600; cursor: pointer; font-size: 1rem; transition: 0.3s;">
                Sign In
            </button>
        </form>
    </div>
</div>
{% endblock %}
