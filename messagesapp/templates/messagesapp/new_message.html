{% extends 'messagesapp/base.html' %}

{% block content %}
<h2>Contact Team</h2>

<form method="POST" class="message-form">
    {% csrf_token %}

    <div class="form-row">
        <label>Name:</label>
        {{ form.name }}
    </div>

    <div class="form-row">
        <label>Email:</label>
        {{ form.email }}
    </div>

    <div class="form-row">
        <label>To:</label>
        {{ form.team }}
    </div>

    <div class="form-row">
        <label>Subject:</label>
        {{ form.message_subject }}
    </div>

    <div class="form-row" style="align-items: start;">
        <label>Message:</label>
        {{ form.message_content }}
    </div>

    <div class="form-actions">
        <button type="submit" name="action" value="send">Send</button>
        <button type="submit" name="action" value="draft">Save Draft</button>
    </div>
</form>

{% endblock %}
