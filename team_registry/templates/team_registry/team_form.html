{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
    <a href="{% url 'organisation_overview' %}" class="btn btn-secondary mb-3">← Back to Organisation</a>
    <div class="card p-4" style="max-width: 600px;">
        <h1 class="mb-4">{{ title }}</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Save</button>
        </form>
    </div>
{% endblock %}
