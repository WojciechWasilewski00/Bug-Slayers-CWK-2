<!DOCTYPE html>
<html>
<head>
    <title>Team Types</title>
</head>
<body>
    <a href="{% url 'organisation_overview' %}">← Back to Organisation</a>
    <h1>Team Types</h1>
    <a href="{% url 'teamtype_create' %}">+ Add Team Type</a>
    {% for teamtype in teamtypes %}
        <div>
            <h3>{{ teamtype.name }}</h3>
            <a href="{% url 'teamtype_edit' teamtype.pk %}">Edit</a>
            <a href="{% url 'teamtype_delete' teamtype.pk %}">Delete</a>
        </div>
    {% empty %}
        <p>No team types found.</p>
    {% endfor %}
</body>
</html>
