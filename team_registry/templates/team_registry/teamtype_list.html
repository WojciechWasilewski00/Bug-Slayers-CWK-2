{% extends 'base.html' %}

{% block title %}Team Types{% endblock %}

{% block content %}
    <a href="{% url 'organisation_overview' %}" class="btn btn-secondary mb-3">← Back to Organisation</a>
    <h1 class="mb-4">Team Types</h1>
    <a href="{% url 'teamtype_create' %}" class="btn btn-primary mb-3">+ Add Team Type</a>
    {% for teamtype in teamtypes %}
        <div class="card mb-3 p-3">
            <h3>{{ teamtype.name }}</h3>
            <a href="{% url 'teamtype_edit' teamtype.pk %}" class="btn btn-sm btn-warning">Edit</a>
            <a href="{% url 'teamtype_delete' teamtype.pk %}" class="btn btn-sm btn-danger">Delete</a>
        </div>
    {% empty %}
        <p>No team types found.</p>
    {% endfor %}
{% endblock %}
