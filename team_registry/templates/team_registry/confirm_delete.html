<!DOCTYPE html>
<html>
<head>
    <title>Delete {{ type }}</title>
</head>
<body>
    <h1>Delete {{ type }}</h1>
    <p>Are you sure you want to delete <strong>{{ object }}</strong>?</p>

        <a href="{% url 'organisation_overview' %}">Cancel</a>
    </form>
</body>
</html>
