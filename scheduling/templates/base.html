{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sky</title>
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --sidebar-bg: #ffffff;
      --sidebar-text: #5a6a85;
      --accent-color: #5d87ff;
      --body-bg: #f4f7f6;
    }
    body {
      background-color: var(--body-bg);
      display: flex;
      min-height: 100vh;
      margin: 0;
      font-family: "Plus Jakarta Sans", sans-serif;
    }

    /* --- Standardized Sidebar --- */
    .sidebar {
      width: 270px;
      background-color: var(--sidebar-bg);
      position: fixed;
      height: 100vh;
      border-right: 1px solid #eef2f6;
      display: flex;
      flex-direction: column;
      z-index: 1050;
    }
    .sidebar-brand {
      padding: 25px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100px;
      text-decoration: none;
    }
    .brand-logo {
      max-width: 180px;
      max-height: 70px;
      width: auto;
      height: auto;
      display: block;
      object-fit: contain;
    }
    .sidebar a {
      padding: 12px 20px;
      margin: 2px 15px;
      display: flex;
      align-items: center;
      color: var(--sidebar-text);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      border-radius: 7px;
      transition: all 0.2s;
    }
    .sidebar a:hover,
    .sidebar a.active {
      background-color: #ecf2ff;
      color: var(--accent-color);
      font-weight: 600;
    }
    .icon-wrapper {
      width: 30px;
      font-size: 1.1rem;
    }
    .nav-section-title {
      font-size: 0.7rem;
      font-weight: 700;
      color: #2a3547;
      text-transform: uppercase;
      padding: 10px 25px;
      margin-top: 15px;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    /* --- Main Content Wrapper --- */
    .main-wrapper {
      margin-left: 270px;
      flex-grow: 1;
      width: calc(100% - 270px);
      display: flex;
      flex-direction: column;
    }

    /* --- Standardized Top Nav --- */
    .top-nav-bar {
      background: #ffffff;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eef2f6;
      position: sticky;
      top: 0;
      z-index: 998;
    }
    .top-nav-links a {
      text-decoration: none;
      color: var(--sidebar-text);
      font-weight: 600;
      font-size: 0.9rem;
      margin-right: 25px;
    }
    /* --- Page Specific Styles --- */
    
      .logout-section {
        padding: 20px;
        border-top: 1px solid #eef2f6;
      }

      .logout-btn {
        width: 100%;
        background: #fff5f5;
        color: var(--danger-red);
        border: 1px solid #ffc9c9;
        padding: 12px;
        border-radius: 7px;
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: 0.2s;
        cursor: pointer;
      }

      .logout-btn:hover {
        background: var(--danger-red);
        color: white;
      }

     
    </style>
  </head>
  <body>
    <body>
      <body>
        <div class="sidebar">
          <div class="sidebar-brand">
            <img src="{% static 'logo/logo.png' %}" alt="Logo" class="brand-logo">
          </div>
          
          <div class="flex-grow-1">
            <a href="{% url 'scheduling:dashboard' %}">
              <span class="icon-wrapper">🏠</span> Dashboard
            </a>
          
            <a href="{% url 'team_page' %}">
              <span class="icon-wrapper">👥</span> Teams
            </a>
            
            <a href="#"><span class="icon-wrapper">📂</span> Documents</a>
          
            <a href="{% url 'scheduling:weekly_schedule' %}">
              <span class="icon-wrapper">📅</span> Schedule
            </a>
          
            <a href="{% url 'inbox' %}">
              <span class="icon-wrapper">📩</span> Messages
            </a>
          </div>

      
          <div class="logout-section">
              <form action="{% url 'logout' %}" method="post" style="margin:0;">
                  {% csrf_token %}
                  <button type="submit" class="logout-btn">🚪 Logout</button>
              </form>
          </div>
        </div>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
  </body>
</html>
