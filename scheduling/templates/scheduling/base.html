<!-- SCHEDULING BASE -->
{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Bug Slayers{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --sidebar-bg: #ffffff;
      --sidebar-text: #5a6a85;
      --accent-color: #5d87ff;
      --hover-bg: #f6f9fc;
      --body-bg: #f4f7f6;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--body-bg);
      font-family: "Plus Jakarta Sans", sans-serif;
    }
    

    .sidebar-brand {
      padding: 25px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100px;
      text-decoration: none;
      overflow: hidden;   /* ⬅ Prevents the logo from overflowing */
    }
    
    .sidebar {
      width: 270px;
      background-color: var(--sidebar-bg);
      position: fixed;
      height: 100vh;
      border-right: 1px solid #eef2f6;
      display: flex;
      flex-direction: column;
      z-index: 1050;
    }
    
    .sidebar-logo {
      max-width: 180px;
      height: auto;
      display: block;
    }

    .sidebar a {
      padding: 10px 20px;
      margin: 2px 15px;
      display: flex;
      align-items: center;
      color: var(--sidebar-text);
      text-decoration: none;
      border-radius: 7px;
      font-weight: 500;
    }

    .sidebar a:hover,
    
    .sidebar a.active {
      background-color: #ecf2ff;
      color: var(--accent-color);
      font-weight: 600;
    }

    .icon-wrapper {
      width: 30px;
      font-size: 1.1rem;
    }

    .main-wrapper {
      margin-left: 270px;       
      flex-grow: 1;
      width: calc(100% - 270px);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    
    
    .top-nav-bar {
      background: #fff;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eef2f6;
      position: sticky;
      top: 0;
      z-index: 998;
      margin-top: 0;
    }

    .top-nav-links a {
      text-decoration: none;
      color: var(--sidebar-text);
      font-weight: 600;
      margin-right: 25px;
    }

    .content-padding {
      padding: 40px;
    }

    .mt-auto {
      margin-top: auto;
    }
    
    .brand-logo { 
      max-width: 180px; 
      max-height: 70px; 
      width: auto; 
      height: auto; 
      display: block; 
      object-fit: contain; }
      
    
  </style>
</head>

<body>
  {% include 'navbar.html' %}
  <div class="main-wrapper">
    <nav class="top-nav-bar">
      <div class="top-nav-links">
        <a href="{% url 'dashboard' %}">Home</a>
        <a href="#">Service</a>
        <a href="#">Portfolio</a>
        <a href="#">Contact</a>
      </div>

      <div class="topbar-right">
        {% if user.is_authenticated %}
          <span>Hello, <strong>{{ user.username }}</strong></span>
          <form action="{% url 'logout' %}" method="post" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="btn btn-sm btn-outline-danger">Logout</button>
          </form>
        {% else %}
          <a href="{% url 'login' %}" class="btn btn-sm btn-primary">Login</a>
        {% endif %}
      </div>
    </nav>

    <div class="content-padding">
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
