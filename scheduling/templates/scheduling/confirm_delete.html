{% extends 'base.html' %}

{% block title %}Confirm Delete - {{ meeting.subject }}{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5 text-center">
                    <div class="mb-4">
                        <span class="display-1 text-danger">⚠️</span>
                    </div>
                    
                    <h2 class="fw-bold text-dark mb-3">Are you sure?</h2>
                    <p class="text-muted mb-4">
                        You are about to delete the meeting: <br>
                        <strong class="text-dark">"{{ meeting.subject }}"</strong><br>
                        This action cannot be undone.
                    </p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg py-3 fw-bold">
                                Yes, Delete Meeting
                            </button>
                            <a href="{% url 'weekly_schedule' %}" class="btn btn-light btn-lg py-3 border">
                                No, Keep It
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
